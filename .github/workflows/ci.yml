name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly drift catch — re-runs the supply-chain jobs against the
  # current advisory db so a new RUSTSEC entry surfaces without
  # waiting for a PR. Uses Monday 12:00 UTC (low-traffic).
  schedule:
    - cron: "0 12 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Crate-level Cargo.toml denies unwrap_used / expect_used /
      # panic / todo / unreachable / unimplemented (Tiger Style) and
      # warns indexing_slicing / arithmetic_side_effects (advisory).
      # Run with `-D warnings` so advisory warnings also fail CI —
      # the local-CI discipline (CLAUDE.md, .claude/rules/tiger-style.md)
      # already requires this; CI mirrors it.
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install uv (for hegeltest backend)
        uses: astral-sh/setup-uv@v5
      - run: cargo build --all-targets --all-features
      - run: cargo test --all-features --no-fail-fast

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
