name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly drift catch — re-runs the supply-chain jobs against the
  # current advisory db so a new RUSTSEC entry surfaces without
  # waiting for a PR. Uses Monday 12:00 UTC (low-traffic).
  schedule:
    - cron: "0 12 * * 1"

# Default to read-only at the workflow level. Jobs that need write
# access declare it explicitly.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      # Crate-level Cargo.toml denies unwrap_used / expect_used /
      # panic / todo / unreachable / unimplemented (Tiger Style) and
      # warns indexing_slicing / arithmetic_side_effects (advisory).
      # Run with `-D warnings` so advisory warnings also fail CI —
      # the local-CI discipline (CLAUDE.md, .claude/rules/tiger-style.md)
      # already requires this; CI mirrors it.
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - name: Install uv (for hegeltest backend)
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - run: cargo build --all-targets --all-features
      - run: cargo test --all-features --no-fail-fast

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25  # v2
        with:
          command: check
          arguments: --all-features

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
