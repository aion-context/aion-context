name: Scorecard

# Runs the OpenSSF Scorecard analyzer on a schedule + on every push to
# main + on branch-protection-rule changes (so the score reflects
# protection settings the moment they change).

on:
  branch_protection_rule:
  schedule:
    - cron: "0 12 * * 1"  # Monday 12:00 UTC, paired with the CI advisory drift schedule
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # to upload SARIF to Code Scanning
      id-token: write          # to publish results to scorecard.dev
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: SARIF
          path: results.sarif
          retention-days: 7

      - name: Upload to Code Scanning dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
